services:
  nginx:
    image: nginx:1.27
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./:/var/www/php
      - ./docker/nginx/nginx-site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - reverb

  backend:
    image: ucc-demo-php
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/php
    volumes:
      - ./:/var/www/php
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      OLLAMA_URL: http://ollama:11434/api/generate
    entrypoint: /var/www/php/docker/php/entrypoint.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"

  node:
    image: node:22-bookworm
    restart: unless-stopped
    working_dir: /var/www/php
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/php
      - node_modules:/var/www/php/node_modules
    command: sh -lc "corepack enable && corepack prepare pnpm@9.11.0 --activate && pnpm install && pnpm run dev --host 0.0.0.0"
    environment:
      CHOKIDAR_USEPOLLING: "true"

  reverb:
    image: ucc-demo-php
    restart: unless-stopped
    working_dir: /var/www/php
    volumes:
      - ./:/var/www/php
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    extra_hosts:
      - "host.docker.internal:host-gateway"

  queue-worker-mail:
    image: ucc-demo-php
    restart: unless-stopped
    working_dir: /var/www/php
    volumes:
      - ./:/var/www/php
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    command: >
      php artisan queue:work database
      --queue=mail
      --tries=5
      --backoff=60
      --sleep=3
      --timeout=120
      --memory=256
      --max-jobs=1000
      --max-time=3600
    stop_grace_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  queue-worker-bot-messages-1:
    image: ucc-demo-php
    restart: unless-stopped
    working_dir: /var/www/php
    volumes:
      - ./:/var/www/php
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
      backend:
        condition: service_started
    env_file:
      - .env
    command: >
      php artisan queue:work database
      --queue=bot-messages
      --tries=3
      --sleep=1
      --timeout=180
      --memory=256
      --max-jobs=1000
      --max-time=3600
    stop_grace_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  queue-worker-bot-messages-2:
    extends: queue-worker-bot-messages-1

  queue-worker-bot-messages-3:
    extends: queue-worker-bot-messages-1

  scheduler:
    image: ucc-demo-php
    restart: unless-stopped
    working_dir: /var/www/php
    volumes:
      - ./:/var/www/php
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    command: php artisan schedule:work

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # Pull model after first start: docker compose -f docker-compose.local.yml exec ollama ollama run llama3.2

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  mysql:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_keyring:/var/lib/mysql-keyring
      - ./docker/mysql/conf.d/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/mysql/keyring-files:/docker/mysql/keyring-files:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  mysql_keyring:
  node_modules:
  ollama_models:
