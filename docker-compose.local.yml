services:
  nginx:
    image: nginx:1.27
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./:/var/www/php
      - ./docker/nginx/nginx-site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - reverb

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/php
    volumes:
      - ./:/var/www/php
    depends_on:
      - mysql
    env_file:
      - .env
    entrypoint: /var/www/php/docker/php/entrypoint.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"

  node:
    image: node:22-bookworm
    restart: unless-stopped
    working_dir: /var/www/php
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/php
      - node_modules:/var/www/php/node_modules
    command: sh -lc "corepack enable && corepack prepare pnpm@9.11.0 --activate && pnpm install && pnpm run dev --host 0.0.0.0"
    environment:
      CHOKIDAR_USEPOLLING: "true"

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/php
    volumes:
      - ./:/var/www/php
    depends_on:
      - backend
      - mysql
    env_file:
      - .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8081

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/php
    volumes:
      - ./:/var/www/php
    depends_on:
      - backend
      - mysql
    env_file:
      - .env
    command: php artisan queue:work database --queue=mail,default --tries=5 --backoff=60 --max-jobs=1000 --max-time=3600

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  mysql:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_keyring:/var/lib/mysql-keyring
      - ./docker/mysql/conf.d/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/mysql/keyring-files:/docker/mysql/keyring-files:ro

volumes:
  mysql_data:
  mysql_keyring:
  node_modules:
